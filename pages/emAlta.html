<!DOCTYPE html>
<html lang="pt-br" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Em Alta — GameVault</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body>

  <header>
    <nav class="navbar">
      <a href="../index.html" class="navLogo">Game<span>Vault</span></a>
      <button class="menuMobileBtn" id="menuMobileBtn">
        ☰
      </button>
      <ul class="navLinks" id="navLinks">
        <li><a href="../index.html">Início</a></li>
        <li><a href="catalogo.html">Catálogo</a></li>
        <li><a href="lancamentos.html">Lançamentos</a></li>
        <li><a href="descontos.html">Descontos</a></li>
        <li><a href="emAlta.html" class="ativo">Em Alta</a></li>
        <li><a href="comunidade.html">Comunidade</a></li>
        <li><a href="perfil.html">Perfil</a></li>
      </ul>
      <button class="searchMobileBtn" id="searchMobileBtn">
        🔍
      </button>
      <div class="navSearch">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="buscaNavbar" placeholder="Buscar jogos..." autocomplete="off">
        <div class="resultsBusca" id="resultadosBusca"></div>
      </div>
      <a href="perfil.html" class="navPerfil">
        <img class="navAvatar" id="avatarNavbar" src="https://placehold.co/36x36/0d1525/4a5e80?text=G" alt="Perfil">
      </a>
    </nav>
  </header>

  <div class="paginaWrapper">
    <div class="layoutListing">

      <div class="cabecalhoPagina">
        <div>
          <h1 class="tituloPagina">📈 Em Alta</h1>
          <p class="subtituloPagina">Rankings e jogos mais populares agora</p>
        </div>
      </div>

      <!-- Ranking Top 10 -->
      <div class="secaoHeader">
        <h2 class="secaoTitulo">🏆 Top 10 da Semana</h2>
      </div>

      <div class="listaRanking" id="listaRanking">
        <div class="centralizador"><div class="spinner"></div></div>
      </div>

      <!-- Grid trending -->
      <div class="secaoHeader" style="margin-top:8px">
        <h2 class="secaoTitulo">Todos os Trending</h2>
        <span id="contagemTrend" style="font-size:13px;color:var(--textMuted)"></span>
      </div>

      <div class="gridJogos" id="gridTrend"></div>

      <div class="centralizador" id="loaderTrend" style="display:none">
        <div class="spinner"></div>
        <span>Carregando...</span>
      </div>
      <div id="fimTrend" style="text-align:center;padding:40px;color:var(--textMuted);font-size:14px;display:none">
        Todos os trending carregados ✓
      </div>

    </div>

    <footer>
      <div class="logoFooter">Game<span>Vault</span></div>
      <p>© 2025 GameVault · <a href="https://rawg.io" target="_blank">RAWG API</a></p>
    </footer>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/emAlta.js"></script>
</body>
</html>
