<!DOCTYPE html>
<html lang="pt-br" data-theme="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo — GameVault</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages.css">
</head>
<body class="temBuscaLocal">

  <header>
    <nav class="navbar">
      <a href="../index.html" class="navLogo">Game<span>Vault</span></a>
      <button class="menuMobileBtn" id="menuMobileBtn">
        ☰
      </button>
      <ul class="navLinks" id="navLinks">
        <li><a href="../index.html">Início</a></li>
        <li><a href="catalogo.html" class="ativo">Catálogo</a></li>
        <li><a href="lancamentos.html">Lançamentos</a></li>
        <li><a href="descontos.html">Descontos</a></li>
        <li><a href="emAlta.html">Em Alta</a></li>
        <li><a href="comunidade.html">Comunidade</a></li>
        <li><a href="perfil.html">Perfil</a></li>
      </ul>
      <button class="searchMobileBtn" id="searchMobileBtn">
        🔍
      </button>
      <div class="navSearch">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="buscaNavbar" placeholder="Buscar jogos..." autocomplete="off">
        <div class="resultsBusca" id="resultadosBusca"></div>
      </div>
      <a href="perfil.html" class="navPerfil">
        <img class="navAvatar" id="avatarNavbar" src="https://placehold.co/36x36/0d1525/4a5e80?text=G" alt="Perfil">
      </a>
    </nav>
  </header>

  <div class="paginaWrapper">
    <div class="layoutCatalogo">

      <!-- SIDEBAR FILTROS -->
      <aside class="sidebarFiltros" id="catalogoFiltros">
        <h3 class="tituloFiltros">Filtros</h3>

        <div class="grupoFiltro">
          <label class="labelFiltro">Ordenar por</label>
          <select id="filtroOrdem" class="selectFiltro">
            <option value="-rating">Melhor avaliação</option>
            <option value="-added">Mais populares</option>
            <option value="-released">Mais recentes</option>
            <option value="name">A-Z</option>
          </select>
        </div>

        <div class="grupoFiltro">
          <label class="labelFiltro">Gênero</label>
          <div class="listaGeneros" id="listaGeneros">
            <div class="centralizador"><div class="spinner"></div></div>
          </div>
        </div>

        <div class="grupoFiltro">
          <label class="labelFiltro">Preço máximo: R$ <span id="exibePreco">500</span></label>
          <input type="range" id="filtroPreco" class="rangePreco" min="0" max="500" value="500" step="10">
        </div>

        <div class="grupoFiltro">
          <label class="checkFiltro">
            <input type="checkbox" id="filtroDesconto"> Apenas com desconto
          </label>
        </div>

        <button class="btn btnPrimario" id="btnAplicar" style="width:100%;margin-bottom:8px">Aplicar Filtros</button>
        <button class="btn btnSecundario" id="btnLimpar" style="width:100%">Limpar</button>
      </aside>

      <!-- ÁREA PRINCIPAL -->
      <main class="areaCatalogo">
        <div class="cabecalhoCatalogo">
          <div>
            <h1 class="tituloPagina">Catálogo</h1>
            <p class="contagemCatalogo" id="contagemCatalogo">Carregando...</p>
          </div>
          <div class="barraBusca">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="buscaCatalogo" placeholder="Buscar no catálogo...">
          </div>
        </div>

        <div class="gridJogos" id="gridCatalogo"></div>

        <div class="centralizador" id="loaderCatalogo" style="display:none">
          <div class="spinner"></div>
          <span>Carregando mais jogos...</span>
        </div>
        <div id="fimCatalogo" style="text-align:center;padding:40px;color:var(--textMuted);font-size:14px;display:none">
          Todos os jogos carregados ✓
        </div>
      </main>

    </div>

    <footer>
      <div class="logoFooter">Game<span>Vault</span></div>
      <p>© 2025 GameVault · <a href="https://rawg.io" target="_blank">RAWG API</a></p>
    </footer>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/filtroNsfw.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/catalogo.js"></script>
</body>
</html>
