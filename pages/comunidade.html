<!DOCTYPE html>
<html lang="pt-br" data-theme="">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comunidade — GameVault</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/pages.css">
  <link rel="icon" href="../favicon.png" type="image/x-icon">
</head>

<body id="topo">

  <header>
    <nav class="navbar">
      <a href="../index.html" class="navLogo">Game<span>Vault</span></a>
      <button class="menuMobileBtn" id="menuMobileBtn">
        ☰
      </button>
      <ul class="navLinks" id="navLinks">
        <li><a href="../index.html">Início</a></li>
        <li><a href="catalogo.html">Catálogo</a></li>
        <li><a href="lancamentos.html">Lançamentos</a></li>
        <li><a href="descontos.html">Descontos</a></li>
        <li><a href="emAlta.html">Em Alta</a></li>
        <li><a href="comunidade.html" class="ativo">Comunidade</a></li>
        <li><a href="perfil.html">Perfil</a></li>
      </ul>
      <button class="searchMobileBtn" id="searchMobileBtn">
        🔍
      </button>
      <div class="navSearch">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8" />
          <path d="m21 21-4.35-4.35" />
        </svg>
        <input type="text" id="buscaNavbar" placeholder="Buscar jogos..." autocomplete="off">
        <div class="resultsBusca" id="resultadosBusca"></div>
      </div>
      <a href="perfil.html" class="navPerfil">
        <img class="navAvatar" id="avatarNavbar" src="https://placehold.co/36x36/0d1525/4a5e80?text=G" alt="Perfil">
      </a>
    </nav>
  </header>

  <div class="paginaWrapper">
    <div class="layoutComunidade">

      <main class="feedComunidade">
        <div class="cabecalhoPagina">
          <div>
            <h1 class="tituloPagina">👾 Comunidade</h1>
            <p class="subtituloPagina">Reviews, discussões e novidades da galera</p>
          </div>
          <button class="btn btnPrimario" id="btnNovaReview">✍️ Nova Review</button>
        </div>

        <div class="painelNovaReview" id="painelNovaReview" style="display:none">
          <h3 class="tituloPainel">Escrever uma Review</h3>

          <div class="campoForm">
            <label>Buscar jogo</label>
            <input type="text" id="buscaJogoReview" placeholder="Digite o nome do jogo...">
            <div class="resultadosJogo" id="resultadosJogoReview"></div>
          </div>

          <div class="campoForm" id="jogoSelecionadoInfo" style="display:none">
            <div id="jogoSelecionadoDisplay"></div>
          </div>

          <div class="campoForm">
            <label>Sua nota</label>
            <div class="estrelasForm" id="estrelasReview">
              <button data-val="1">★</button>
              <button data-val="2">★</button>
              <button data-val="3">★</button>
              <button data-val="4">★</button>
              <button data-val="5">★</button>
            </div>
          </div>

          <div class="campoForm">
            <label>Review</label>
            <textarea id="textoReview" placeholder="O que você achou do jogo?"></textarea>
          </div>

          <div style="display:flex;gap:10px">
            <button class="btn btnPrimario" id="btnPublicarReview">Publicar</button>
            <button class="btn btnSecundario" id="btnCancelarReview">Cancelar</button>
          </div>
        </div>

        <div id="feedReviews"></div>
      </main>

      <aside class="sidebarComunidade">
        <div class="cardSidebar">
          <h3 class="tituloSidebar">Seu Perfil</h3>
          <div class="perfilMini" id="perfilMini"></div>
        </div>

        <div class="cardSidebar">
          <h3 class="tituloSidebar">🔥 Top Reviews</h3>
          <div id="topReviews"></div>
        </div>

        <div class="cardSidebar">
          <h3 class="tituloSidebar">🎮 Em Destaque</h3>
          <div id="jogosDestaque">
            <div class="centralizador">
              <div class="spinner"></div>
            </div>
          </div>
        </div>
      </aside>

    </div>

    <footer>
      <div class="logoFooter">Game<span>Vault</span></div>
      <p>© 2025 GameVault · <a href="https://rawg.io" target="_blank">RAWG API</a></p>
    </footer>
  </div>

  <a href="#topo" id="btnTopo" class="btnTopo" title="Voltar ao topo" aria-label="Voltar ao topo">
  <svg viewBox="0 0 24 24" aria-hidden="true">
    <path d="M6 14l6-6 6 6"></path>
  </svg>
</a>


  <script src="../js/storage.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/ui.js"></script>
  <script src="../js/comunidade.js"></script>
</body>

</html>
